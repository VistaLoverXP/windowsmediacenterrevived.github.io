<body>
    <!-- <nodes.js embedding> -->
    <script type="text/javascript" src="js/nodes.js"></script>
    <script type="text/javascript">
        var nodesjs = new NodesJs({
            id: 'nodes',
            width: window.innerWidth,
            height: window.innerHeight,
            particleSize: 5,
            lineSize: 1,
            particleColor: [108, 0, 207, 0.812],
            lineColor: [255, 255, 255],
            backgroundFrom: [31, 186, 146],
            backgroundTo: [35, 0, 140],
            backgroundDuration: 7000,
            nobg: false,
            number: window.hasOwnProperty('orientation') ? 30: 100,
            speed: -30
        });
    </script>


    <div style="position: absolute; left: 0px; top: 0px; overflow: hidden; width: 100%; height: 100%;">
        <canvas id="nodes"></canvas>
    </div>
    <!-- </nodes.js embedding> -->

    <script type="text/javascript">
        window.onresize = function () {
            nodesjs.setWidth(window.innerWidth);
            nodesjs.setHeight(window.innerHeight);
        };
    </script>
